<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 940" font-family="-apple-system, 'Segoe UI', Roboto, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888780"/>
    </marker>
    <marker id="arrow-err" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b04a3f"/>
    </marker>
  </defs>
  <style>
    .title  { font-weight: 700; font-size: 15px; }
    .sub    { font-size: 12px; }
    .node   { stroke-width: 2; }
    .customer   { fill: #e1f5ee; stroke: #0f6e56; }
    .customer-t { fill: #0f6e56; }
    .gate       { fill: #faeeda; stroke: #854f0b; }
    .gate-t     { fill: #854f0b; }
    .shared     { fill: #f1efe8; stroke: #e2e0d9; }
    .shared-t   { fill: #444441; }
    .errbox   { fill: #f7e7e4; stroke: #b04a3f; stroke-width: 2; }
    .err-t    { fill: #b04a3f; }
    .req      { stroke: #888780; stroke-width: 2; fill: none; }
    .err      { stroke: #b04a3f; stroke-width: 2; fill: none; }
    .err-d    { stroke: #b04a3f; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
    .edge-lbl { fill: #6b6a63; font-size: 12px; }
    .heading  { fill: #2b2b28; font-weight: 700; font-size: 22px; }
  </style>

  <rect x="0" y="0" width="1060" height="940" fill="#ffffff"/>

  <text x="40" y="42" class="heading">Customer booking funnel — cash MVP</text>
  <text x="40" y="66" class="shared-t sub">osta_readme_files/features/booking-funnel.md · epic #44 · planned (booking/ is a stub; backend M3 merged &amp; ready)</text>

  <!-- legend -->
  <g transform="translate(40,86)">
    <rect x="0"   y="0" width="18" height="18" rx="4" class="node customer"/>
    <text x="24"  y="14" class="shared-t sub">customer funnel step</text>
    <rect x="180" y="0" width="18" height="18" rx="4" class="node errbox"/>
    <text x="204" y="14" class="shared-t sub">error / recovery branch</text>
    <text x="400" y="14" class="edge-lbl sub">GET /centers/{center}/availability · GET /vehicles · POST /bookings · POST /bookings/{id}/confirm</text>
  </g>

  <!-- ===== main funnel (left column, cx=280) ===== -->
  <!-- S1 -->
  <rect x="100" y="130" width="360" height="60" rx="12" class="node customer"/>
  <text x="280" y="156" text-anchor="middle" class="title customer-t">1 · Pick service</text>
  <text x="280" y="176" text-anchor="middle" class="sub customer-t">from the center's catalog (via discovery / profile)</text>
  <path class="req" d="M280,190 V222" marker-end="url(#arrow)"/>

  <!-- S2 -->
  <rect x="100" y="224" width="360" height="76" rx="12" class="node customer"/>
  <text x="280" y="250" text-anchor="middle" class="title customer-t">2 · Pick live slot</text>
  <text x="280" y="270" text-anchor="middle" class="sub customer-t">GET /centers/{center}/availability?date=YYYY-MM-DD</text>
  <text x="280" y="288" text-anchor="middle" class="sub customer-t">{ is_open, slots[{ start, end, available }] }</text>
  <path class="req" d="M280,300 V332" marker-end="url(#arrow)"/>

  <!-- S3 -->
  <rect x="100" y="334" width="360" height="76" rx="12" class="node customer"/>
  <text x="280" y="360" text-anchor="middle" class="title customer-t">3 · Hold slot · 10-min countdown</text>
  <text x="280" y="380" text-anchor="middle" class="sub customer-t">POST /bookings → 201 status = pending</text>
  <text x="280" y="398" text-anchor="middle" class="sub customer-t">hold_expires_at = now + 10m (server-enforced)</text>
  <path class="req" d="M280,410 V442" marker-end="url(#arrow)"/>

  <!-- S4 -->
  <rect x="100" y="444" width="360" height="84" rx="12" class="node customer"/>
  <text x="280" y="470" text-anchor="middle" class="title customer-t">4 · Review · attach vehicle · confirm</text>
  <text x="280" y="490" text-anchor="middle" class="sub customer-t">GET /vehicles · POST /bookings/{id}/confirm</text>
  <text x="280" y="508" text-anchor="middle" class="sub customer-t">payment_method = pay_at_center</text>
  <text x="280" y="524" text-anchor="middle" class="sub customer-t">duplicate-submit guard on the CTA</text>

  <!-- ===== error branches (right column, cx=780) ===== -->
  <!-- E1 : 409 slot_taken -->
  <rect x="600" y="224" width="360" height="52" rx="12" class="node errbox"/>
  <text x="620" y="248" class="title err-t">409 slot_taken</text>
  <text x="620" y="267" class="sub err-t">someone booked it first → re-pick a slot</text>
  <path class="err" d="M460,360 C540,360 540,250 600,250" marker-end="url(#arrow-err)"/>

  <!-- E2 : hold expired -->
  <rect x="600" y="292" width="360" height="52" rx="12" class="node errbox"/>
  <text x="620" y="316" class="title err-t">hold countdown → 0</text>
  <text x="620" y="335" class="sub err-t">hold expired → confirm blocked, re-pick a slot</text>
  <path class="err" d="M460,384 C540,384 540,318 600,318" marker-end="url(#arrow-err)"/>

  <!-- recover dashed back to S2 -->
  <path class="err-d" d="M600,270 C520,270 520,214 460,236" marker-end="url(#arrow-err)"/>
  <text x="470" y="212" class="err-t sub">recover → step 2</text>

  <!-- E3 : 422 field errors -->
  <rect x="600" y="452" width="360" height="52" rx="12" class="node errbox"/>
  <text x="620" y="476" class="title err-t">422 ValidationException</text>
  <text x="620" y="495" class="sub err-t">fieldErrors → highlight the review form</text>
  <path class="err" d="M460,486 H600" marker-end="url(#arrow-err)"/>

  <!-- ===== after confirm → booking lives on ===== -->
  <path class="req" d="M280,528 V572" marker-end="url(#arrow)"/>
  <text x="292" y="556" class="edge-lbl">after confirm</text>

  <!-- My bookings -->
  <rect x="100" y="574" width="360" height="60" rx="12" class="node customer"/>
  <text x="280" y="600" text-anchor="middle" class="title customer-t">My bookings  ·  #45</text>
  <text x="280" y="620" text-anchor="middle" class="sub customer-t">list · status badges · filter tabs</text>

  <!-- realtime live status timeline -->
  <rect x="560" y="560" width="440" height="120" rx="12" class="node shared"/>
  <text x="580" y="586" class="title shared-t">Live status  ·  #47 realtime</text>
  <text x="580" y="604" class="sub shared-t">Reverb private channel  bookings.{id}  (polling fallback)</text>
  <g>
    <rect x="580" y="620" width="86" height="34" rx="17" class="node customer"/>
    <text x="623" y="641" text-anchor="middle" class="sub customer-t">requested</text>
    <path class="req" d="M666,637 H686" marker-end="url(#arrow)"/>
    <rect x="686" y="620" width="86" height="34" rx="17" class="node customer"/>
    <text x="729" y="641" text-anchor="middle" class="sub customer-t">confirmed</text>
    <path class="req" d="M772,637 H792" marker-end="url(#arrow)"/>
    <rect x="792" y="620" width="94" height="34" rx="17" class="node customer"/>
    <text x="839" y="641" text-anchor="middle" class="sub customer-t">in progress</text>
    <path class="req" d="M886,637 H906" marker-end="url(#arrow)"/>
    <rect x="906" y="620" width="86" height="34" rx="17" class="node customer"/>
    <text x="949" y="641" text-anchor="middle" class="sub customer-t">completed</text>
  </g>

  <!-- contract note -->
  <rect x="100" y="708" width="900" height="86" rx="12" class="node gate"/>
  <text x="122" y="734" class="title gate-t">Follow the shipped backend contract</text>
  <text x="122" y="757" class="sub gate-t">Create payload is  { service_center_id, vehicle_id, service_ids[], slot_start }  (backend #43) — not the app-epic sketch</text>
  <text x="122" y="775" class="sub gate-t">{ service_id, slot, vehicle_id, payment_method }. Pay-at-center cash is the MVP default; online payments arrive with app #46.</text>
</svg>
