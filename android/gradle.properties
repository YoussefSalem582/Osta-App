org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Disable Kotlin incremental compilation.
# Kotlin's incremental compiler (RelocatableFileToPathConverter) computes a
# relative path between each source file and the project directory. When the
# Flutter Pub cache and the project live on different Windows drives
# (e.g. cache on C:\ and project on D:\), that relative path cannot be
# computed across drive roots and the Kotlin daemon crashes with
# "this and base files have different roots", corrupting the incremental
# caches. Turning incremental compilation off avoids this cross-drive path
# calculation entirely.
kotlin.incremental=false
