# Shared, strict lints applied app-wide (single source of truth for every PR).
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    # Generated localizations — regenerated in CI, never hand-edited, not linted.
    - "lib/core/l10n/**"

linter:
  rules:
    # This is an application, not a published package — API doc comments on
    # every public member are noise here.
    public_member_api_docs: false
