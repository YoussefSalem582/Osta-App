name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: 3.44.1
  DART_DEFINES: >-
    --dart-define=BASE_URL=https://api.osta.dev/api/v1
    --dart-define=FLAVOR=dev

jobs:
  analyze-test:
    name: format · analyze · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      # Format only hand-written (tracked) files; generated code is git-ignored.
      - run: dart format --output=none --set-exit-if-changed $(git ls-files '*.dart')
      - run: flutter analyze
      - run: flutter test

  build-android:
    name: build APK
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug ${{ env.DART_DEFINES }}

  build-ios:
    name: build iOS (no codesign)
    needs: analyze-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --no-codesign --debug ${{ env.DART_DEFINES }}
