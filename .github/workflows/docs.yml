name: docs

# Docs hygiene on every PR/push that touches a markdown file. Catches markdown
# lint regressions and broken intra-repo / external links across the doc set
# (AGENTS.md, CONTRIBUTING.md, docs/, osta_readme_files/ (incl. docs/), and
# the per-tool shims in .agents/.codex/.cursor/.github).

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Rule config lives in .markdownlint.jsonc. .claude/skills/ is vendored
      # upstream (see .claude/skills/README.md) — we don't reformat it.
      - name: Run markdownlint-cli2
        run: npx -y markdownlint-cli2 "**/*.md" "#**/node_modules" "#.claude/skills"

  link-check:
    name: link-check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          # Fail on broken intra-repo links; tolerate rate-limited hosts (429).
          # Mail links are skipped by default, so there is no --exclude-mail:
          # current lychee rejects that flag outright and the job dies before
          # checking a single link.
          # osta_backend is a private repo — its issue links resolve for the
          # team but 404 for an unauthenticated runner, so they can't be checked.
          args: >-
            --no-progress
            --max-redirects 5
            --accept '200..=299, 429'
            --exclude '^file:'
            --exclude 'http(s)?://localhost'
            --exclude 'github\.com/YoussefSalem582/osta_backend'
            './**/*.md'
          fail: true
